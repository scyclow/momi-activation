<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">

  <title></title>

  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
      touch-action: manipulation;
      font-family: Roboto, sans-serif;
      color: #f00;
    }

    body {
      animation: GreenYellow 10s linear infinite;
    }

    main {
      width: 100vw;
      height: 100vh;
      max-width: 680px;
      max-height: 386px;
      margin: auto;
    }

    .box {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      box-sizing: border-box;
      flex: 1;
      padding: 5px;
    }

      @keyframes BorderBlink {
        0%, 49.99% {
          border: 5px solid;
        }

        50%, 100% {
          border: 5px solid transparent;
        }
      }

    h1, h2 {
      text-align: center;
    }

    h1 {
      font-size: 32px;

    }

    h2 {
      font-size: 26px;
    }


    a {
      text-decoration: underline;
    }

    code {
      font-family: monospace;
      font-weight: 900;
      font-size: 24px;
      display: block;
      text-align: center;
      letter-spacing: 1px;
    }

    #display-code {
      background: #f00;
    }
    #display-code * {
      animation: GreenYellowColor 10s linear infinite;
    }

    #warning {
      max-height: 85vh;
      max-width: 85vw;
    }


    @keyframes ActivationBlink {
      to {
        visibility: hidden;
      }
    }


    @keyframes GreenYellow {
      0%, 100% {
        background: #0f0;
      }

      50% {
        background: #ff0;
      }
    }

    @keyframes GreenYellowColor {
      0%, 100% {
        color: #0f0;
      }

      50% {
        color: #ff0;
      }
    }


  </style>
</head>
<body>

  <main id="main" class="box">
    <div class="box">
      <div class="box">
        <div class="box">
          <h1>WELCOME TO THE MUSEUM OF MOVING IMAGE "ACTIVATION CENTER"</h1>

          <div id="display-code" style="margin: 24px 0; padding: 12px;">
            <div style="font-weight: bold; font-size: 14px; text-align: center;">ACTIVATION CODE:</div>
            <code style="margin-top: 4px">MOMI2026!</code>
          </div>

          <div>
            <h2>PLEASE ENTER</h2>
            <h2>THE ACTIVATION CODE ON THE</h2>
            <h2><a>MOVINGIMAGE.ORG</a> ACTIVATION ENTRY PAGE</h2>
          </div>
        </div>
      </div>
    </div>
  </div>

  </main>


</body>

<script type="module">
  import {$, SoundSrc, getQueryParam, css, MAX_VOLUME} from './utils.js'


  const interval = Number(getQueryParam('interval')) || 5000
  const baseFreq = Number(getQueryParam('freq')) || 300


  let clicked
  document.onclick = () => {
    if (!clicked) {
      clicked = true
      const s = new SoundSrc('square')
      const s2 = new SoundSrc('square')
      const s3 = new SoundSrc('square')

      const freqLen = Math.min(300, interval/6)
      const diatonicRatios = [0.5, 1.25, 1.5, 1.75, 2].reverse()

      diatonicRatios.forEach((ratio, i) => {
        const freq = baseFreq * ratio
        const delay = (interval / 10) * i

        setTimeout(() => {
          s.note(freq, freqLen)
          setInterval(() => {
            s.note(freq, freqLen)
          }, interval / 2)
        }, delay)
      })

      // setInterval(() => {
        s2.play(baseFreq, 0.25)
        s3.play(baseFreq + 1, 0.25)
      // }, interval)

      const boxes = $.cls('box')
      const count = boxes.length + 1
      boxes.forEach((b, i) => {
        b.style.animation = `BorderBlink ${interval}ms steps(2, start) infinite`
        b.style.animationDelay = `-${(count - i) * (interval/(2*count))}ms`
      })

      $.id('display-code').style.animation = `ActivationBlink ${interval}ms steps(2, start) infinite`
      $.id('display-code').style.animationDelay = `-${1 * (interval/(2*count))}ms`

    }
  }

</script>
</html>
